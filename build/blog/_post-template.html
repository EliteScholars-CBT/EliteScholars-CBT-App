<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">EliteScholars Blog</title>
  <meta name="description" id="meta-desc" content="" />
  <meta name="keywords" id="meta-keywords" content="" />
  <meta name="author" id="meta-author" content="Michael Joseph" />
  <meta name="robots" content="index, follow" />
  <meta property="og:title" id="og-title" content="" />
  <meta property="og:description" id="og-desc" content="" />
  <meta property="og:type" content="article" />
  <meta property="og:image" content="https://elitescholars.site/android-chrome-512x512.png" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="theme-color" content="#4B0082" />
  <link rel="canonical" id="canonical" href="" />
  <link rel="icon" href="../../favicon.ico" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../blog-style.css" />
</head>
<body>

<nav class="blog-topbar">
  <a href="../../" class="blog-topbar-logo">
    <svg width="40" height="28" viewBox="0 0 28 28" fill="none"><circle cx="14" cy="14" r="14" fill="#D4AF37"/><text x="14" y="19" text-anchor="middle" fill="#4B0082" font-size="14" font-weight="900" font-family="sans-serif">E</text></svg>
    EliteScholars
  </a>
  <div class="blog-topbar-nav">
    <a href="../../">App</a>
    <a href="../index.html">Blog</a>
    <a href="../../" class="blog-topbar-cta">Practice Free →</a>
  </div>
</nav>

<div id="post-root"></div>

<footer class="blog-footer">
  <div class="blog-footer-links">
    <a href="../../">Home</a>
    <a href="../index.html">Blog</a>
    <a href="../../#privacy">Privacy</a>
    <a href="../../#terms">Terms</a>
  </div>
  <div>© 2026 EliteScholars. Free exam prep for every Nigerian student.</div>
</footer>

<script src="../posts.js"></script>
<script src="../_blog-engine.js"></script>
<script>
(function() {
  const slug = window.location.pathname.split('/').pop().replace('.html', '');
  const post = BLOG_POSTS.find(p => p.id === slug);
  const root = document.getElementById('post-root');

  if (!post) {
    root.innerHTML = '<div style="max-width:420px;margin:80px auto;text-align:center;padding:40px 24px"><div style="font-size:48px;margin-bottom:16px">😕</div><h2 style="font-size:20px;font-weight:800">Post not found</h2><p style="color:#6B7280;margin-top:8px">The post you are looking for does not exist or has been moved.</p><a href="../index.html" style="display:inline-block;margin-top:20px;background:#6C3FC9;color:#fff;padding:10px 22px;border-radius:20px;font-weight:700;text-decoration:none">Back to Blog</a></div>';
    return;
  }

  if (!BlogEngine.isLive(post)) {
    root.innerHTML = '<div class="blog-not-live blog-container"><div class="blog-not-live-icon">⏳</div><h2>Coming Soon</h2><p>This post has not been published yet. Check back on ' + BlogEngine.formatDate(post.publishAt) + '.</p></div>';
    return;
  }

  document.getElementById('page-title').textContent = post.seo.title;
  document.getElementById('meta-desc').setAttribute('content', post.seo.description);
  document.getElementById('meta-keywords').setAttribute('content', post.seo.keywords);
  document.getElementById('meta-author').setAttribute('content', post.author);
  document.getElementById('og-title').setAttribute('content', post.seo.title);
  document.getElementById('og-desc').setAttribute('content', post.seo.description);
  document.getElementById('canonical').setAttribute('href', 'https://elitescholars.site/blog/' + post.category + '/' + post.id + '.html');

  const catStyle = BlogEngine.getCategoryStyle(post.category);

  const AFFILIATE_AD = {
    icon: '📚',
    title: 'JAMB Masterclass Bundle',
    desc: '5,000+ questions, video solutions & answer keys — offline access.',
    link: 'https://elitescholars.site/shop',
    cta: 'Get It Now →',
  };

  const PARTNER_AD = {
    logo: '🎯',
    title: 'Score 300+ Coaching',
    desc: '30-day intensive programme. Limited spots! Join now.',
    link: 'https://elitescholars.site/coaching',
  };

  const contentWithAds = BlogEngine.injectAdsIntoContent(post.content, AFFILIATE_AD, PARTNER_AD);

  const otherPosts = BLOG_POSTS.filter(p => p.id !== post.id && BlogEngine.isLive(p)).slice(0, 2);

  const relatedHtml = otherPosts.length > 0 ? `
  <div class="blog-related">
    <div class="blog-related-title">More from EliteScholars</div>
    <div class="blog-related-grid">
      ${otherPosts.map(rp => {
        const rs = BlogEngine.getCategoryStyle(rp.category);
        return `<a href="${rp.id}.html" class="blog-related-card">
          <span class="blog-related-cat" style="background:${rs.bg};color:${rs.color}">${rs.label}</span>
          <div class="blog-related-card-title">${rp.title}</div>
          <div class="blog-related-meta">${rp.readTime} min read · ${BlogEngine.formatDate(rp.publishAt)}</div>
        </a>`;
      }).join('')}
    </div>
  </div>` : '';

  const shareUrl = encodeURIComponent(window.location.href);
  const shareText = encodeURIComponent(post.title + ' — EliteScholars Blog');

  root.innerHTML = `
<div class="blog-hero">
  <div class="blog-container">
    <span class="blog-hero-category" style="background:${catStyle.bg};color:${catStyle.color}">${catStyle.label}</span>
    <h1 class="blog-hero-title">${post.title}</h1>
    <p class="blog-hero-excerpt">${post.excerpt}</p>
    <div class="blog-meta">
      <div class="blog-author-row">
        <div class="blog-author-avatar">${BlogEngine.getAvatar(post.authorAvatar)}</div>
        <span class="blog-author-name">${post.author}</span>
      </div>
      <span class="blog-meta-dot">·</span>
      <span class="blog-meta-item">📅 ${BlogEngine.formatDate(post.publishAt)}</span>
      <span class="blog-meta-dot">·</span>
      <span class="blog-meta-item">⏱ ${post.readTime} min read</span>
    </div>
  </div>
</div>

<div class="blog-container">
  <div class="blog-body">

    <div class="blog-content">${contentWithAds}</div>

    <div class="blog-tags">
      ${post.tags.map(t => `<span class="blog-tag">${t}</span>`).join('')}
    </div>

    <div class="blog-cta-box">
      <h3>Practice What You Just Learned 🔥</h3>
      <p>Free CBT practice, learn mode, timed exams — for JAMB, WAEC, NECO, Post UTME & GST. No signup needed.</p>
      <a href="../../" class="blog-cta-btn">Start Practising Free →</a>
    </div>

    <div class="blog-share">
      <div class="blog-share-title">Found this helpful? Share it with a friend who needs it 👇</div>
      <div class="blog-share-btns">
        <a class="blog-share-btn whatsapp" href="https://wa.me/?text=${shareText}%20${shareUrl}" target="_blank" rel="noopener">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/></svg>
          WhatsApp
        </a>
        <a class="blog-share-btn twitter" href="https://twitter.com/intent/tweet?text=${shareText}&url=${shareUrl}" target="_blank" rel="noopener">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
          Twitter
        </a>
        <button class="blog-share-btn copy" onclick="navigator.clipboard.writeText(window.location.href).then(()=>this.textContent='✓ Copied!')">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>
          Copy Link
        </button>
      </div>
    </div>

    ${relatedHtml}

  </div>
</div>`;
})();
</script>

</body>
</html>
